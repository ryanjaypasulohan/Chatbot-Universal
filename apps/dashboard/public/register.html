<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register — Wild Script</title>
  <link rel="icon" href="/assets/logo.webp" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/wildscript.css" />
</head>
<body>
  <div class="ws-auth-page">
    <div class="ws-auth-card">
      <div style="text-align:center">
        <img src="/assets/logo.webp" alt="Wild Script" width="56" height="56" />
        <h1 class="ws-logo-text" style="font-size:1.75rem;margin-top:12px">Create account</h1>
        <p class="ws-card-desc">Start building AI chatbots for your websites</p>
      </div>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@company.com" />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="new-password" placeholder="Min. 6 characters" />

      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Repeat your password" />

      <button type="button" class="ws-btn ws-btn-primary" id="registerBtn" style="width:100%">Create account</button>

      <p style="text-align:center;margin-top:20px;color:var(--ws-text-muted)">
        Already have an account? <a href="/login.html">Sign in</a>
      </p>
      <div id="msg"></div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import { Auth } from '/js/auth.js';

    const supabase = createClient(window.SUPABASE_URL || '', window.SUPABASE_ANON_KEY || '');
    const msgEl = document.getElementById('msg');

    document.getElementById('registerBtn').addEventListener('click', async () => {
      msgEl.innerHTML = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (!email || !password || !confirm) {
        msgEl.innerHTML = '<div class="ws-alert ws-alert-error">Provide email and both password fields.</div>';
        return;
      }
      if (password.length < 6) {
        msgEl.innerHTML = '<div class="ws-alert ws-alert-error">Password must be at least 6 characters.</div>';
        return;
      }
      if (password !== confirm) {
        msgEl.innerHTML = '<div class="ws-alert ws-alert-error">Passwords do not match.</div>';
        return;
      }

      const { error } = await supabase.auth.signUp({ email, password });
      if (error) {
        // Surface detailed error from Supabase (helps diagnose DB/backend issues)
        msgEl.innerHTML = `<div class="ws-alert ws-alert-error">${error.message}</div>`;
        return;
      }

      msgEl.innerHTML = '<div class="ws-alert ws-alert-success">Account created. Check your email to confirm, then <a href="/login.html">sign in</a>.</div>';
    });
  </script>
  <footer class="ws-footer">
    <div class="ws-footer-inner">
      <div class="ws-footer-links">
        <a href="https://www.linkedin.com/in/ryan-jay-pasulohan-0a7413254/" target="_blank">LinkedIn</a>
        <a href="https://www.upwork.com/freelancers/~01dbc7860414d71ecf" target="_blank">Upwork</a>
        <a href="https://portfolio2026-9z5c.vercel.app/" target="_blank">Portfolio</a>
        <a href="https://portfolio2026-9z5c.vercel.app/ryanjaypasulohan.pdf" target="_blank">Resume</a>
      </div>
      <div class="ws-footer-meta">Brought to life by Ryan Jay — © 2026</div>
    </div>
  </footer>
</body>
</html>
