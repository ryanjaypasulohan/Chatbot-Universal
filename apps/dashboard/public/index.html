<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wild Script — AI Chatbot Platform</title>
  <link rel="icon" href="/assets/logo.webp" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/wildscript.css" />
</head>
<body>
  <div class="ws-auth-page">
    <p style="color:var(--ws-text-muted)">Loading Wild Script...</p>
  </div>
  <script src="/config.js"></script>
  <script type="module">
    import { Auth } from '/js/auth.js';
    Auth.captureOAuthToken();
    const me = await Auth.validateSession();
    window.location.replace(me ? '/dashboard.html' : '/login.html');
  </script>
</body>
</html>
