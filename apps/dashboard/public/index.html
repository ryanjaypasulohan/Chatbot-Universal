<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f7fb; color: #1f2937; }
    h1 { margin-bottom: 0.5rem; }
    .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08); }
    input, button, textarea { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #d1d5db; margin-top: 8px; font-size: 1rem; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .small { width: auto; display: inline-block; margin-right: 8px; }
    .website { margin-bottom: 12px; }
    pre { white-space: pre-wrap; background: #efefff; padding: 12px; border-radius: 12px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>AI Chatbot Dashboard</h1>
  <div class="card">
    <h2>Add a website</h2>
    <label>Domain</label>
    <input id="domain" placeholder="example.com" />
    <label>Start URL (optional)</label>
    <input id="startUrl" placeholder="https://example.com" />
    <button id="createWebsite">Create website</button>
    <div id="createResult"></div>
  </div>

  <div class="card">
    <h2>Crawl website</h2>
    <label>Website ID</label>
    <input id="crawlWebsiteId" placeholder="Website ID" />
    <label>Start URL (optional)</label>
    <input id="crawlUrl" placeholder="https://example.com" />
    <button id="startCrawl">Crawl website content</button>
    <div id="crawlResult"></div>
  </div>

  <div class="card">
    <h2>Websites</h2>
    <div id="websiteList">Loading websites...</div>
  </div>

  <div class="card">
    <h2>Embed snippet</h2>
    <p>After creating a website, copy this snippet into your site and update the website ID and API URL.</p>
    <pre id="embedSnippet">Use the dashboard to generate a website first.</pre>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
