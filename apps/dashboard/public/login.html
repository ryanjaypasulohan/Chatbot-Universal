<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - AI Chatbot Dashboard</title>
    <style>
      body { font-family: Arial, sans-serif; background:#f4f7fb; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
      .card { background:#fff; padding:24px; border-radius:12px; box-shadow:0 8px 24px rgba(15,23,42,0.08); width:320px }
      input, button { width:100%; padding:10px 12px; margin-top:8px; border-radius:8px; border:1px solid #d1d5db }
      button { background:#2563eb; color:#fff; border:none; cursor:pointer }
      .link { margin-top:12px; text-align:center }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Sign In</h2>
      <label>Email</label>
      <input id="email" type="email" />
      <label>Password</label>
      <input id="password" type="password" />
      <button id="loginBtn">Sign in</button>
      <button id="googleBtn" style="background:#fff;color:#111;border:1px solid #d1d5db;margin-top:8px">Sign in with Google</button>

      <div class="link">
        <a href="/register.html">Create an account</a>
      </div>
      <div id="msg" style="margin-top:8px;color:#ef4444"></div>
    </div>

    <script src="/config.js"></script>
    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

      // TODO: replace with your Supabase project values
      const SUPABASE_URL = window.SUPABASE_URL || '<YOUR_SUPABASE_URL>';
      const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || '<YOUR_SUPABASE_ANON_KEY>';

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const emailEl = document.getElementById('email');
      const passEl = document.getElementById('password');
      const msgEl = document.getElementById('msg');

      document.getElementById('loginBtn').addEventListener('click', async () => {
        msgEl.textContent = '';
        const email = emailEl.value.trim();
        const password = passEl.value;
        if (!email || !password) { msgEl.textContent = 'Provide email and password.'; return; }

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { msgEl.textContent = error.message || String(error); return; }
        if (data?.session?.access_token) {
          localStorage.setItem('sb_access_token', data.session.access_token);
          window.location.href = '/';
        }
      });

      document.getElementById('googleBtn').addEventListener('click', async () => {
        await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/' } });
      });
    </script>
  </body>
</html>
