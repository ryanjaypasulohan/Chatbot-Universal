<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — Wild Script</title>
  <link rel="icon" href="/assets/logo.webp" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/wildscript.css" />
</head>
<body>
  <div class="ws-auth-page">
    <div class="ws-auth-card">
      <div style="text-align:center">
        <img src="/assets/logo.webp" alt="Wild Script" width="56" height="56" />
        <h1 class="ws-logo-text" style="font-size:1.75rem;margin-top:12px">Wild Script</h1>
        <p class="ws-card-desc">Sign in to manage your AI chatbots</p>
      </div>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@company.com" />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />

      <button type="button" class="ws-btn ws-btn-primary" id="loginBtn" style="width:100%">Sign in</button>
      <button type="button" class="ws-btn ws-btn-secondary" id="googleBtn" style="width:100%">Sign in with Google</button>

      <p style="text-align:center;margin-top:20px;color:var(--ws-text-muted)">
        No account? <a href="/register.html">Create one</a>
      </p>
      <div id="msg"></div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import { Auth } from '/js/auth.js';

    const SUPABASE_URL = window.SUPABASE_URL || '';
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || '';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    Auth.captureOAuthToken();
    const existing = await Auth.validateSession();
    if (existing) {
      window.location.replace('/dashboard.html');
    }

    const msgEl = document.getElementById('msg');

    document.getElementById('loginBtn').addEventListener('click', async () => {
      msgEl.innerHTML = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        msgEl.innerHTML = '<div class="ws-alert ws-alert-error">Provide email and password.</div>';
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        msgEl.innerHTML = `<div class="ws-alert ws-alert-error">${error.message}</div>`;
        return;
      }
      if (data?.session?.access_token) {
        Auth.setToken(data.session.access_token, data.session.refresh_token);
        const me = await Auth.validateSession();
        if (me) {
          window.location.replace('/dashboard.html');
        } else {
          msgEl.innerHTML =
            '<div class="ws-alert ws-alert-error">Signed in but session could not be verified. Check Supabase keys in .env and restart the API.</div>';
        }
      } else {
        msgEl.innerHTML =
          '<div class="ws-alert ws-alert-error">No session returned. Confirm your email if required, then try again.</div>';
      }
    });

    document.getElementById('googleBtn').addEventListener('click', async () => {
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' },
      });
    });
  </script>
</body>
</html>
